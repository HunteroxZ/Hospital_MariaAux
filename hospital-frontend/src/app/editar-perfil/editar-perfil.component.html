<div class="form-card">
  <h2>Editar mi Perfil</h2>
  
  <div *ngIf="pacienteActual.dni">
    <p><strong>DNI:</strong> {{ pacienteActual.dni }}</p>
    <p><strong>Paciente:</strong> {{ pacienteActual.nombres }} {{ pacienteActual.apellidos }}</p>
    <p><strong>Correo:</strong> {{ pacienteActual.correo }}</p>
  </div>

  <hr>
  <p>Edita tus datos personales.</p>

  <form (ngSubmit)="onUpdate()" #updateForm="ngForm">
    
    <div>
      <label for="telefono">Teléfono:</label>
      <input type="tel" id="telefono" name="telefono"
             [(ngModel)]="updateData.telefono">
    </div>

    <div>
      <label for="direccion">Dirección:</label>
      <input type="text" id="direccion" name="direccion"
             [(ngModel)]="updateData.direccion">
    </div>

    <div>
      <label for="talla">Talla (ej: 1.75):</label>
      <input type="number" step="0.01" id="talla" name="talla"
             [(ngModel)]="updateData.talla">
    </div>

    <div>
      <label for="peso">Peso (ej: 70.5):</label>
      <input type="number" step="0.1" id="peso" name="peso"
             [(ngModel)]="updateData.peso">
    </div>

    <hr>
    
    <div>
      <label for="clave">Nueva Contraseña (opcional):</label>
      <input type="password" id="clave" name="clave"
             [(ngModel)]="updateData.clave"
             placeholder="Dejar en blanco para no cambiar">
    </div>
    
    <button type="submit">Actualizar Perfil</button>
  </form>

  <div class="form-link">
    <a routerLink="/dashboard">Volver</a>
  </div>
</div>
